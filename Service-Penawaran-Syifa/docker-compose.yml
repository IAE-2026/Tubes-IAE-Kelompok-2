services:
  app:
    build: .
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    environment:
      APP_NAME: "Service Penawaran"
      APP_ENV: local
      APP_KEY: base64:QGy1oErtVYJ7wTp4oWAjfXDgdQ+As3wb3PuV88JxDoU=
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: sail
      DB_PASSWORD: password
      API_KEY: KEY-MHS-203
    depends_on:
      - mysql
  mysql:
    image: 'mysql:8.0'
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 'password'
      MYSQL_DATABASE: 'laravel'
      MYSQL_USER: 'sail'
      MYSQL_PASSWORD: 'password'
    volumes:
      - 'mysql_data:/var/lib/mysql'
volumes:
  mysql_data:
    driver: local